<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eleição EB LN</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">

<div class="overlay"></div>

<div class="hero-content">

<h1>ELEIÇÃO OFICIAL</h1>

<h2>Exército Brasileiro LN</h2>

<p>
Participe do processo eleitoral e registre sua candidatura.
Apenas 15 vagas estão disponíveis.
</p>

<a href="#inscricao" class="btn">
INSCREVER-SE
</a>

</div>

</header>

<section id="inscricao">

<h2>Inscrição de Candidatos</h2>

<form id="formInscricao">

<input
id="roblox"
type="text"
placeholder="Nick do Roblox"
required
>

<input
id="discord"
type="text"
placeholder="Usuário do Discord"
required
>

<button type="submit">
Próximo
</button>

</form>

<div id="resultado"></div>

</section>

<section>

<h2>Vagas</h2>

<div id="contadorVagas"></div>

<div id="listaVagas"></div>

</section>

<script src="script.js"></script>

</body>
</html>
